[server]
port = 8888
worker_threads = 8

[thread_pool]
max_queue_size = 50000

[log]
level = warn
path = logs/server_benchmark_lt.log
max_file_size = 104857600
max_files = 3

[heartbeat]
timeout = 30
interval = 10

[protocol]
version = 1
payload_format = json
compatible_json = true

[net]
epoll_mode = lt
tcp_nodelay = true
high_water_mark_bytes = 1048576
low_water_mark_bytes = 262144
max_output_buffer_bytes = 4194304
max_packet_bytes = 1048576

[overload]
max_connections = 50000
max_qps = 200000

[redis]
enabled = false

[cluster]
enabled = false
node_id = benchmark-node

[mysql]
enabled = false

[rate_limit]
enable = false

[circuit_breaker]
enable = false

[connection]
auth_timeout_seconds = 3600
idle_timeout_seconds = 3600
slow_consumer_kick_seconds = 600

[metrics]
enable = false
