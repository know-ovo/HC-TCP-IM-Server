[server]
port = 8888
worker_threads = 4

[thread_pool]
max_queue_size = 10000

[log]
level = info
path = logs/server_full.log
max_file_size = 104857600
max_files = 3

[heartbeat]
timeout = 30
interval = 10

[protocol]
version = 1
payload_format = json
compatible_json = true

[net]
epoll_mode = lt
tcp_nodelay = true
high_water_mark_bytes = 1048576
low_water_mark_bytes = 262144
max_output_buffer_bytes = 4194304
max_packet_bytes = 1048576

[overload]
max_connections = 10000
max_qps = 100000

[redis]
enabled = true
host = 127.0.0.1
port = 6379
timeout_ms = 2000
session_expire = 86400

[cluster]
enabled = true
node_id = node-1
node_alive_ttl_seconds = 15
route_ttl_seconds = 30

[mysql]
enabled = true
host = 127.0.0.1
port = 3306
user = root
password = 123456
database = im_server
connect_timeout_ms = 2000

[reliable]
retry_interval_ms = 5000
ack_timeout_ms = 15000
retry_backoff_ms = 3000
max_retry_count = 5
retry_batch_size = 200

[rate_limit]
enable = true
max_connect_per_ip_per_sec = 20
login_qps = 2000
p2p_qps = 10000
broadcast_qps = 200
user_send_per_sec = 50

[circuit_breaker]
enable = true
thread_pool_failure_threshold = 10
half_open_after_ms = 5000

[connection]
auth_timeout_seconds = 10
idle_timeout_seconds = 300
slow_consumer_kick_seconds = 30

[metrics]
enable = true
bind = 0.0.0.0
port = 9100
path = /metrics
